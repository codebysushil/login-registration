name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.2-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.2-

      - name: Prepare dependencies
        run: composer remove laravel/pao --dev --no-interaction --no-update

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check Rector
        run: vendor/bin/rector --dry-run

      - name: Check Pint
        run: vendor/bin/pint --parallel --test

  types:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.2-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.2-

      - name: Prepare dependencies
        run: composer remove laravel/pao --dev --no-interaction --no-update

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --ansi

  tests:
    name: Tests (PHP ${{ matrix.php }} - PEST ${{ matrix.pest }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        pest: ['3.0', '4.0']
        exclude:
          - php: '8.2'
            pest: '4.0'
          - php: '8.5'
            pest: '3.0'

